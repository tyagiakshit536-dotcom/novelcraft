<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelCraft — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1A0E0E;
        font-family: 'Inter', system-ui, sans-serif;
        color: #FFF0F0;
    }

    /* ============================================
       3D ORB — ZOOMED FULL-SCREEN (CROPS WATERMARK)
       The viewer is 140% of viewport so the bottom-right
       watermark is pushed outside the visible area.
       ============================================ */
    .orb-stage {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 0;
    }

    .orb-stage spline-viewer {
        position: absolute;
        top: -34%;
        left: -34%;
        width: 168%;
        height: 168%;
        display: block;
        zoom: 114%;
    }

    .orb-stage spline-viewer::part(logo) {
        display: none !important;
    }

    /* ============================================
       LOGIN FORM — FLOATS DIRECTLY ON THE ORB (LEFT SIDE)
       No background panel, no glass, no border. Pure overlay.
       ============================================ */
    .login-float {
        position: fixed;
        top: 0;
        left: calc(50% - 420px);
        width: 500px;
        height: 100vh;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 2.5rem 2.8rem;
        overflow-y: auto;
        animation: floatIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes floatIn {
        from { transform: translateX(-60px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    /* ============================================
       LOGO
       ============================================ */
    .lf-welcome {
        font-family: 'Playfair Display', serif;
        font-size: 1.75rem;
        font-weight: 900;
        color: #FFF0F0;
        text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        margin-bottom: 1.5rem;
        white-space: nowrap;
        animation: fadeUp 0.5s 0.2s ease-out both;
    }

    /* ============================================
       AUTH TOGGLE
       ============================================ */
    .auth-toggle {
        display: flex;
        background: rgba(26, 14, 14, 0.45);
        border-radius: 12px;
        padding: 3px;
        margin-bottom: 1.6rem;
        border: 1px solid rgba(226, 74, 74, 0.15);
        backdrop-filter: blur(10px);
        animation: fadeUp 0.5s 0.35s ease-out both;
    }

    .toggle-btn {
        flex: 1;
        padding: 0.75rem;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: rgba(255, 240, 240, 0.5);
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        letter-spacing: 0.02em;
    }

    .toggle-btn.active {
        background: #E24A4A;
        color: #FFF0F0;
        box-shadow: 0 4px 18px rgba(226, 74, 74, 0.4);
    }

    .toggle-btn:not(.active):hover {
        color: #FFF0F0;
    }

    /* ============================================
       FORMS
       ============================================ */
    .auth-form { display: none; }

    .auth-form.active {
        display: block;
        animation: formIn 0.3s ease-out;
    }

    @keyframes formIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes formShake {
        0%, 100% { transform: translateX(0); }
        15%, 55%, 85% { transform: translateX(-5px); }
        35%, 70% { transform: translateX(5px); }
    }

    .auth-form.shake { animation: formShake 0.45s ease-out; }

    /* ============================================
       INPUTS — WATER TOUCH
       ============================================ */
    .input-group {
        position: relative;
        margin-bottom: 1.2rem;
    }

    .input-group input {
        width: 100%;
        padding: 1.05rem 1.1rem;
        background: rgba(26, 14, 14, 0.35);
        border: 1.5px solid rgba(226, 74, 74, 0.15);
        border-radius: 12px;
        color: #FFF0F0;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        transition: all 0.35s ease;
        outline: none;
        backdrop-filter: blur(8px);
    }

    .input-group input::placeholder { color: transparent; }

    .input-group input:focus {
        border-color: rgba(226, 74, 74, 0.6);
        box-shadow:
            0 0 0 3px rgba(226, 74, 74, 0.12),
            0 0 24px rgba(226, 74, 74, 0.08);
        background: rgba(26, 14, 14, 0.5);
    }

    /* Water ripple follow */
    .input-group::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 12px;
        opacity: 0;
        transition: opacity 0.4s ease;
        background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%),
            rgba(226, 74, 74, 0.12) 0%, transparent 60%);
        pointer-events: none;
    }

    .input-group:focus-within::after { opacity: 1; }

    .input-group label {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.85rem;
        color: rgba(176, 144, 144, 0.8);
        pointer-events: none;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        padding: 0 4px;
        text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }

    .input-group input:focus ~ label,
    .input-group input:not(:placeholder-shown) ~ label {
        top: 0;
        font-size: 0.65rem;
        color: #E24A4A;
        font-weight: 600;
        letter-spacing: 0.06em;
        background: rgba(26, 14, 14, 0.7);
        border-radius: 4px;
        text-shadow: none;
    }

    /* Password toggle */
    .pw-toggle {
        position: absolute;
        right: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #B09090;
        cursor: pointer;
        font-size: 1rem;
        padding: 2px;
        transition: color 0.2s;
        line-height: 1;
    }

    .pw-toggle:hover { color: #E24A4A; }

    .input-group input[type="password"] ~ .pw-toggle .eye-on,
    .input-group input[type="text"] ~ .pw-toggle .eye-off { display: none; }
    .input-group input[type="text"] ~ .pw-toggle .eye-on,
    .input-group input[type="password"] ~ .pw-toggle .eye-off { display: inline; }

    /* ============================================
       FORGOT
       ============================================ */
    .forgot-row {
        display: flex;
        justify-content: flex-end;
        margin: -0.4rem 0 1rem;
    }

    .forgot-row a {
        font-size: 0.76rem;
        color: rgba(226, 74, 74, 0.9);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
        text-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    .forgot-row a:hover { color: #FFC0C0; }

    /* ============================================
       SUBMIT BUTTON
       ============================================ */
    .btn-submit {
        width: 100%;
        height: 52px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #E24A4A 0%, #EE5E5E 50%, #E24A4A 100%);
        background-size: 200% 100%;
        color: #FFF0F0;
        font-family: 'Inter', sans-serif;
        font-size: 1.02rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .btn-submit::before {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
        opacity: 0;
        transition: opacity 0.3s;
    }

    .btn-submit:hover {
        filter: brightness(1.12);
        transform: scale(1.02);
        box-shadow: 0 8px 32px rgba(226, 74, 74, 0.45);
        background-position: 100% 0;
    }

    .btn-submit:hover::before { opacity: 1; }
    .btn-submit:active { transform: scale(0.98); }

    .btn-submit.success {
        background: linear-gradient(135deg, #4AE29A, #36C486);
        pointer-events: none;
    }

    .btn-submit .btn-text { display: inline; }
    .btn-submit .btn-check { display: none; font-size: 1.1rem; }
    .btn-submit.success .btn-text { display: none; }
    .btn-submit.success .btn-check {
        display: inline;
        animation: checkPop 0.4s ease-out;
    }

    @keyframes checkPop {
        0% { transform: scale(0); opacity: 0; }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); opacity: 1; }
    }

    /* ============================================
       DIVIDER
       ============================================ */
    .divider {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin: 1.3rem 0;
    }

    .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(226, 74, 74, 0.2), transparent);
    }

    .divider span {
        font-size: 0.88rem;
        color: rgba(176, 144, 144, 0.6);
        letter-spacing: 0.04em;
        white-space: nowrap;
        text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }

    /* ============================================
       SOCIAL — ICON ONLY
       ============================================ */
    .social-row {
        display: flex;
        gap: 0.55rem;
        justify-content: center;
    }

    .btn-social {
        width: 46px;
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        border: 1.5px solid rgba(226, 74, 74, 0.15);
        background: rgba(26, 14, 14, 0.3);
        backdrop-filter: blur(8px);
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .btn-social:hover {
        border-color: rgba(226, 74, 74, 0.5);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(226, 74, 74, 0.2);
        background: rgba(226, 74, 74, 0.1);
    }

    .btn-social svg {
        width: 20px;
        height: 20px;
        position: relative;
        z-index: 1;
    }

    .btn-social:active { transform: translateY(0) scale(0.95); }

    /* ============================================
       PASSWORD STRENGTH
       ============================================ */
    .strength-wrap {
        margin: -0.5rem 0 1rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
    }

    .strength-track {
        flex: 1;
        height: 3px;
        background: rgba(69, 42, 42, 0.6);
        border-radius: 3px;
        overflow: hidden;
    }

    .strength-fill {
        height: 100%;
        width: 0%;
        border-radius: 3px;
        transition: all 0.4s ease;
    }

    .strength-fill.weak { width: 33%; background: #FF6584; }
    .strength-fill.medium { width: 66%; background: #E2B04A; }
    .strength-fill.strong { width: 100%; background: #4AE29A; }

    .strength-label {
        font-size: 0.63rem;
        color: #B09090;
        font-weight: 500;
        letter-spacing: 0.05em;
        min-width: 42px;
        text-align: right;
    }

    /* ============================================
       TERMS
       ============================================ */
    .terms-text {
        margin-top: 1rem;
        text-align: center;
        font-size: 0.7rem;
        color: rgba(176, 144, 144, 0.55);
        line-height: 1.6;
        text-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    .terms-text a {
        color: rgba(226, 74, 74, 0.8);
        text-decoration: none;
    }

    .terms-text a:hover { text-decoration: underline; }

    /* ============================================
       BACK HOME
       ============================================ */
    .back-home {
        margin-top: 1.5rem;
        text-align: center;
        animation: fadeUp 0.5s 0.8s ease-out both;
    }

    .back-home a {
        font-size: 0.92rem;
        color: rgba(176, 144, 144, 0.6);
        text-decoration: none;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }

    .back-home a:hover { color: #E24A4A; }

    /* ============================================
       ANIMATIONS
       ============================================ */
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .a1 { animation: fadeUp 0.5s 0.4s ease-out both; }
    .a2 { animation: fadeUp 0.5s 0.45s ease-out both; }
    .a3 { animation: fadeUp 0.5s 0.5s ease-out both; }
    .a4 { animation: fadeUp 0.5s 0.55s ease-out both; }
    .a5 { animation: fadeUp 0.5s 0.6s ease-out both; }
    .a6 { animation: fadeUp 0.5s 0.65s ease-out both; }
    .a7 { animation: fadeUp 0.5s 0.7s ease-out both; }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 1024px) {
        .orb-stage {
            display: none;
        }

        .login-float {
            inset: 50% auto auto 50%;
            left: 50%;
            top: 50%;
            width: min(92vw, 500px);
            height: auto;
            max-height: 92vh;
            transform: translate(-50%, -50%);
            animation: none;
            padding: 1.5rem;
            border: 1px solid rgba(226, 74, 74, 0.15);
            border-radius: 18px;
            background: rgba(26, 14, 14, 0.68);
            backdrop-filter: blur(18px);
        }

        .lf-welcome {
            white-space: normal;
            text-align: center;
        }
    }

    @media (max-width: 520px) {
        .login-float {
            width: min(82vw, 360px);
            padding: 0.85rem 0.8rem;
        }

        .lf-welcome {
            font-size: 1.35rem;
            margin-bottom: 1rem;
        }

        .social-row { gap: 0.4rem; }
        .btn-social { width: 40px; height: 40px; }
    }
    </style>
</head>

    <!-- 3D Orb — Zoomed 140% to crop out watermark -->

                    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#E24A4A"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/><path d="M5.84 14.09a7.12 7.12 0 0 1 0-4.18V7.07H2.18a11.98 11.98 0 0 0 0 9.86l3.66-2.84Z" fill="#FBBC05"/><path d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.47 14.97 0 12 0 7.7 0 3.99 2.47 2.18 6.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/></svg>

                <button type="button" class="btn-social" title="GitHub" data-provider="github">
                    <svg viewBox="0 0 24 24" fill="#FFF0F0"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12Z"/></svg>

    </div>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.68/build/spline-viewer.js"></script>
    <script>
    (function() {
        /* Toggle */
        var toggleBtns = document.querySelectorAll('.toggle-btn');
        var signinForm = document.getElementById('signinForm');
        var signupForm = document.getElementById('signupForm');
        toggleBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                toggleBtns.forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                if (btn.getAttribute('data-form') === 'signin') {
                    signinForm.classList.add('active');
                    signupForm.classList.remove('active');
                } else {
                    signupForm.classList.add('active');
                    signinForm.classList.remove('active');
                }
            });
        });

        /* Password toggle */
        document.querySelectorAll('.pw-toggle').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                var inp = btn.parentElement.querySelector('input');
                inp.type = inp.type === 'password' ? 'text' : 'password';
            });
        });

        /* Water ripple follow */
        document.querySelectorAll('.input-group').forEach(function(g) {
            g.addEventListener('mousemove', function(e) {
                var r = g.getBoundingClientRect();
                g.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%');
                g.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%');
            });
        });

        /* Password strength */
        var suPass = document.getElementById('su-pass');
        var bar = document.getElementById('strengthBar');
        var lbl = document.getElementById('strengthLabel');
        if (suPass) {
            suPass.addEventListener('input', function() {
                var v = suPass.value, s = 0;
                if (v.length >= 6) s++;
                if (v.length >= 10) s++;
                if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
                if (/[^A-Za-z0-9]/.test(v)) s++;
                bar.className = 'strength-fill';
                if (!v.length) { bar.style.width = '0%'; lbl.textContent = ''; }
                else if (s <= 1) { bar.classList.add('weak'); lbl.textContent = 'Weak'; lbl.style.color = '#FF6584'; }
                else if (s <= 2) { bar.classList.add('medium'); lbl.textContent = 'Medium'; lbl.style.color = '#E2B04A'; }
                else { bar.classList.add('strong'); lbl.textContent = 'Strong'; lbl.style.color = '#4AE29A'; }
            });
        }

        /* Submit */
        function handleSubmit(form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var valid = true;
                form.querySelectorAll('input[required]').forEach(function(inp) {
                    if (!inp.value.trim()) {
                        valid = false;
                        inp.style.borderColor = '#FF6584';
                        inp.style.boxShadow = '0 0 0 3px rgba(255,101,132,0.2)';
                        setTimeout(function() { inp.style.borderColor = ''; inp.style.boxShadow = ''; }, 2000);
                    }
                });
                if (!valid) { form.classList.add('shake'); setTimeout(function() { form.classList.remove('shake'); }, 500); return; }
                
                form.querySelector('.btn-submit').classList.add('success');
                
                // Get form type and gather values based on the form 
                var isLogin = form.id === 'signinForm';
                var payload = {};
                
                if (isLogin) {
                    payload = {
                        email: document.getElementById('si-email').value,
                        password: document.getElementById('si-pass').value
                    };
                    window.parent.postMessage({ type: 'auth-login', payload: payload }, '*');
                } else {
                    var nameInput = document.getElementById('su-name');
                    var fullName = (nameInput && nameInput.value ? nameInput.value : '').trim();
                    var normalizedUsername = fullName.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
                    payload = {
                        email: document.getElementById('su-email').value,
                        password: document.getElementById('su-pass').value,
                        username: normalizedUsername || 'novel_writer',
                        displayName: fullName || 'Novel Writer'
                    };
                    window.parent.postMessage({ type: 'auth-signup', payload: payload }, '*');
                }
            });
        }
        handleSubmit(signinForm);
        handleSubmit(signupForm);

        /* Social OAuth */
        document.querySelectorAll('.btn-social[data-provider]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var provider = btn.getAttribute('data-provider');
                if (!provider) return;
                window.parent.postMessage({ type: 'auth-social', payload: { provider: provider } }, '*');
            });
        });

        /* Hide Spline watermark via shadow DOM */
        function hideWM(v) {
            if (!v || !v.shadowRoot) return;
            var logo = v.shadowRoot.querySelector('#logo');
            if (logo) logo.style.display = 'none';
            v.shadowRoot.querySelectorAll('a[href*="spline"]').forEach(function(a) { a.style.display = 'none'; });
            v.shadowRoot.querySelectorAll('div, a, img, svg').forEach(function(el) {
                var s = window.getComputedStyle(el);
                if (s.position === 'absolute' && s.bottom !== 'auto' && s.right !== 'auto' &&
                    parseInt(s.bottom) <= 30 && parseInt(s.right) <= 30) el.style.display = 'none';
            });
        }
        function process() {
            document.querySelectorAll('spline-viewer').forEach(function(v) {
                hideWM(v);
                if (v.shadowRoot) {
                    new MutationObserver(function() { hideWM(v); }).observe(v.shadowRoot, { childList: true, subtree: true });
                }
            });
        }
        window.addEventListener('load', function() {
            setTimeout(process, 1500);
            setTimeout(process, 3000);
            setTimeout(process, 6000);
        });
    })();
    </script>
</body>
